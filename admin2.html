<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Jakoop Cloud ☁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        
      .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a0a, #1a1a1a); display: flex; justify-content: center; align-items: center; z-index: 99999; }
      .login-box { background: #141414; padding: 40px; border-radius: 20px; border: 2px solid #00ff88; text-align: center; box-shadow: 0 0 60px rgba(0, 255, 136, 0.3); }
      .login-box h2 { color: #00ff88; margin-bottom: 20px; font-size: 32px; }
      .login-box input { width: 300px; padding: 15px; background: #0a0a0a; border: 2px solid #333; border-radius: 10px; color: white; font-size: 18px; text-align: center; font-family: 'Cairo'; margin-bottom: 20px; }
      .login-box button { width: 100%; padding: 15px; background: linear-gradient(45deg, #00ff88, #00cc88); border: none; border-radius: 10px; color: #000; font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Cairo'; }
      .login-error { color: #ff3333; margin-top: 15px; display: none; }
        
      .container { max-width: 1400px; margin: 0 auto; display: none; }
      .container.active { display: block; }
      .header { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); padding: 30px; border-radius: 16px; margin-bottom: 30px; border: 2px solid #00ff88; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
      .header h1 { font-size: 32px; background: linear-gradient(45deg, #00ff88, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .header-actions { display: flex; gap: 15px; }
      .cloud-status { padding: 8px 15px; background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; border-radius: 20px; font-size: 14px; color: #00ff88; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
      .stat-card { background: #141414; padding: 25px; border-radius: 16px; border: 1px solid #222; text-align: center; }
      .stat-card h3 { color: #888; font-size: 14px; margin-bottom: 10px; }
      .stat-card.num { font-size: 36px; font-weight: 900; color: #00ff88; }
      .controls { background: #141414; padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #222; display: flex; gap: 15px; flex-wrap: wrap; }
      .btn { padding: 12px 25px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
      .btn-primary { background: linear-gradient(45deg, #00ff88, #00cc88); color: #000; }
      .btn-danger { background: linear-gradient(45deg, #ff3333, #cc0000); color: white; }
      .btn-warning { background: linear-gradient(45deg, #ffa500, #ff8800); color: #000; }
      .btn:hover { transform: scale(1.05); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .products-grid { display: grid; gap: 20px; }
      .product-card { background: #141414; padding: 20px; border-radius: 16px; border: 1px solid #222; display: grid; grid-template-columns: 150px 1fr auto; gap: 20px; align-items: start; }
      .product-card.sold { opacity: 0.6; border-color: #ff3333; }
      .product-image-box img { width: 150px; height: 150px; object-fit: cover; border-radius: 12px; }
      .image-upload { margin-top: 10px; }
      .image-upload label { display: block; padding: 8px; background: #00ff88; color: #000; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; }
      .image-upload input { display: none; }
      .product-info h3 { color: #00ff88; margin-bottom: 12px; font-size: 20px; }
      .product-info p { color: #888; font-size: 14px; margin: 6px 0; }
      .price-edit { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
      .price-edit input { width: 120px; padding: 10px; background: #0a0a0a; border: 2px solid #00ff88; border-radius: 8px; color: #ffa500; font-size: 20px; font-weight: 900; text-align: center; }
      .price-edit button { padding: 10px 15px; background: #00ff88; border: none; border-radius: 8px; color: #000; font-weight: 700; cursor: pointer; }
      .product-actions { display: flex; gap: 10px; flex-direction: column; }
      .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; overflow-y: auto; padding: 20px; }
      .modal.active { display: flex; }
      .modal-content { background: #141414; padding: 30px; border-radius: 20px; border: 2px solid #00ff88; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
      .modal-content h2 { color: #00ff88; margin-bottom: 20px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; margin-bottom: 8px; color: #888; }
      .form-group input,.form-group textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: white; font-family: 'Cairo'; font-size: 15px; }
      .image-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-top: 10px; border: 2px solid #333; }
      .form-actions { display: flex; gap: 10px; margin-top: 25px; }
      .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
      .badge-success { background: #00ff88; color: #000; }
      .badge-danger { background: #ff3333; color: white; }
      .loading { text-align: center; padding: 60px; color: #00ff88; font-size: 20px; }
      .floating-settings { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #ff0088, #ff0066); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9997; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 0, 136, 0.5); transition: 0.3s; text-decoration: none; color: white; font-size: 28px; }
      .floating-tools { position: fixed; bottom: 110px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #0088ff, #0066ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9997; cursor: pointer; box-shadow: 0 4px 20px rgba(0, 136, 255, 0.5); transition: 0.3s; text-decoration: none; color: white; font-size: 28px; }
      .floating-settings:hover { transform: scale(1.1) rotate(90deg); }
      .floating-tools:hover { transform: scale(1.1) rotate(90deg); }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔒 لوحة التحكم Cloud</h2>
            <p style="color: #888; margin-bottom: 20px;">ادخل كلمة السر للدخول</p>
            <input type="password" id="passwordInput" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">دخول</button>
            <div class="login-error" id="loginError">❌ كلمة السر غلط</div>
        </div>
    </div>

    <div class="container" id="mainContent">
        <div class="header">
            <div>
                <h1>⚙️ لوحة التحكم - Cloud ☁️</h1>
                <div class="cloud-status" id="cloudStatus">🟢 متصل بـ Firebase</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
                <button class="btn btn-primary" onclick="openAddModal()">+ إضافة جهاز</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><h3>إجمالي الأجهزة</h3><div class="num" id="totalCount">0</div></div>
            <div class="stat-card"><h3>متوفر</h3><div class="num" id="availableCount">0</div></div>
            <div class="stat-card"><h3>مباع</h3><div class="num" id="soldCount">0</div></div>
            <div class="stat-card"><h3>قيمة المخزون</h3><div class="num" id="totalValue">0</div></div>
        </div>

        <div class="controls">
            <button class="btn btn-warning" onclick="syncData()">🔄 تحديث من Cloud</button>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="loading">☁️ جاري التحميل من Cloud...</div>
        </div>
    </div>

    <a href="#" class="floating-settings" title="الإعدادات">⚙️</a>
    <a href="#" class="floating-tools" title="الأدوات">🔧</a>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">إضافة جهاز جديد</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group"><label>اسم الجهاز *</label><input type="text" id="productName" required></div>
                <div class="form-group">
                    <label>صورة الجهاز *</label>
                    <input type="file" id="productImageFile" accept="image/*" onchange="previewImage(event)">
                    <img id="imagePreview" class="image-preview" style="display:none">
                </div>
                <div class="form-group"><label>المعالج</label><input type="text" id="productCPU"></div>
                <div class="form-group"><label>الرام</label><input type="text" id="productRAM"></div>
                <div class="form-group"><label>التخزين</label><input type="text" id="productStorage"></div>
                <div class="form-group"><label>كرت الشاشة</label><input type="text" id="productGPU"></div>
                <div class="form-group"><label>الشاشة</label><input type="text" id="productScreen"></div>
                <div class="form-group"><label>السعر (دينار) *</label><input type="number" id="productPrice" required></div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="productStatus" style="width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: white; font-family: 'Cairo';">
                        <option value="available">متوفر</option>
                        <option value="sold">مباع</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveBtn">💾 حفظ على Cloud</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">❌ إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase Config تبعك
        const firebaseConfig = {
            apiKey: "AIzaSyAVDbjneBoV3N9KIo86-pYccAEy6R4ULHk",
            authDomain: "jakoop-admin2.firebaseapp.com",
            projectId: "jakoop-admin2",
            storageBucket: "jakoop-admin2.firebasestorage.app",
            messagingSenderId: "581628638568",
            appId: "1:581628638568:web:2894ef9722a0a47ab3e19d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productsCol = collection(db, 'products');

        const ADMIN_PASSWORD = 'jakoop2026'; // غير كلمة السر هون
        let products = [];
        let currentImageBase64 = '';

        window.checkPassword = function() {
            if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                localStorage.setItem('jakoop_admin2_logged', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                loadProducts();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        window.logout = function() {
            if (confirm('متأكد بدك تطلع؟')) {
                localStorage.removeItem('jakoop_admin2_logged');
                location.reload();
            }
        }

        if (localStorage.getItem('jakoop_admin2_logged') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            loadProducts();
        }

        function loadProducts() {
            onSnapshot(productsCol, (snapshot) => {
                products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id,...doc.data() });
                });
                renderProducts();
                updateStats();
            });
        }

        window.syncData = loadProducts;

        function updateStats() {
            document.getElementById('totalCount').textContent = products.length;
            document.getElementById('availableCount').textContent = products.filter(p => p.status === 'available').length;
            document.getElementById('soldCount').textContent = products.filter(p => p.status === 'sold').length;
            document.getElementById('totalValue').textContent = products.reduce((sum, p) => sum + (p.status === 'available'? parseFloat(p.price) : 0), 0) + ' د';
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding: 60px; color: #666;">لا توجد أجهزة. اضغط "إضافة جهاز" للبدء</div>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card ${p.status === 'sold'? 'sold' : ''}">
                    <div class="product-image-box">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="image-upload">
                            <label for="img-${p.id}">📸 تغيير</label>
                            <input type="file" id="img-${p.id}" accept="image/*" onchange="updateProductImage('${p.id}', event)">
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>المعالج: ${p.cpu || '-'}</p>
                        <p>الرام: ${p.ram || '-'} | التخزين: ${p.storage || '-'}</p>
                        <div class="price-edit">
                            <input type="number" value="${p.price}" id="price-${p.id}">
                            <button onclick="updatePrice('${p.id}')">💾</button>
                        </div>
                        <span class="badge ${p.status === 'available'? 'badge-success' : 'badge-danger'}">
                            ${p.status === 'available'? 'متوفر ✓' : 'مباع ✗'}
                        </span>
                    </div>
                    <div class="product-actions">
                        <button class="btn btn-primary" onclick="editProduct('${p.id}')">✏️ تعديل</button>
                        <button class="btn btn-warning" onclick="toggleStatus('${p.id}')">
                            ${p.status === 'available'? '❌ بيع' : '✓ إرجاع'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    currentImageBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        window.updateProductImage = async function(id, event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    await updateDoc(doc(db, 'products', id), { image: e.target.result });
                    alert('✅ تم تحديث الصورة على Cloud!');
                };
                reader.readAsDataURL(file);
            }
        }

        window.updatePrice = async function(id) {
            const newPrice = document.getElementById('price-' + id).value;
            await updateDoc(doc(db, 'products', id), { price: newPrice });
            alert('✅ تم تحديث السعر على Cloud!');
        }

        window.openAddModal = function() {
            document.getElementById('modalTitle').textContent = 'إضافة جهاز جديد';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            currentImageBase64 = '';
            document.getElementById('productModal').classList.add('active');
        }

        window.editProduct = function(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = 'تعديل الجهاز';
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name;
            document.getElementById('imagePreview').src = p.image;
            document.getElementById('imagePreview').style.display = 'block';
            currentImageBase64 = p.image;
            document.getElementById('productCPU').value = p.cpu || '';
            document.getElementById('productRAM').value = p.ram || '';
            document.getElementById('productStorage').value = p.storage || '';
            document.getElementById('productGPU').value = p.gpu || '';
            document.getElementById('productScreen').value = p.screen || '';
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productStatus').value = p.status;
            document.getElementById('productModal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('productModal').classList.remove('active');
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '⏳ جاري الحفظ...';
            
            const id = document.getElementById('productId').value;
            const product = {
                name: document.getElementById('productName').value,
                image: currentImageBase64,
                cpu: document.getElementById('productCPU').value,
                ram: document.getElementById('productRAM').value,
                storage: document.getElementById('productStorage').value,
                gpu: document.getElementById('productGPU').value,
                screen: document.getElementById('productScreen').value,
                price: document.getElementById('productPrice').value,
                status: document.getElementById('productStatus').value,
                updated: new Date().toISOString()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, 'products', id), product);
                } else {
                    await addDoc(productsCol, product);
                }
                closeModal();
                alert('✅ تم الحفظ على Cloud بنجاح!');
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 حفظ على Cloud';
            }
        };

        window.toggleStatus = async function(id) {
            const p = products.find(x => x.id === id);
            await updateDoc(doc(db, 'products', id), { status: p.status === 'available'? 'sold' : 'available' });
        }

        window.deleteProduct = async function(id) {
            if (confirm('متأكد بدك تحذف هاد الجهاز من Cloud؟')) {
                await deleteDoc(doc(db, 'products', id));
            }
        }
    </script>
<!-- 3 أزرار التحكم العائمة -->
<style>
.floating-btn {
    position: fixed;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9997;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: white;
    font-size: 28px;
    font-weight: 700;
}

.floating-btn:hover {
    transform: scale(1.15) rotate(15deg);
}

/* 1- لوحة التحكم - وردي */
.floating-admin {
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #ff0088, #ff0066);
    box-shadow: 0 4px 20px rgba(255, 0, 136, 0.5);
}
.floating-admin:hover {
    box-shadow: 0 6px 30px rgba(255, 0, 136, 0.8);
}

/* 2- لوحة المشغل - أخضر نيون */
.floating-operator {
    bottom: 110px;
    right: 30px;
    background: linear-gradient(135deg, #00ff88, #00cc66);
    box-shadow: 0 4px 20px rgba(0, 255, 136, 0.5);
}
.floating-operator:hover {
    box-shadow: 0 6px 30px rgba(0, 255, 136, 0.8);
}

/* 3- لوحة المستودع - أزرق سماوي */
.floating-warehouse {
    bottom: 190px;
    right: 30px;
    background: linear-gradient(135deg, #00ccff, #0088ff);
    box-shadow: 0 4px 20px rgba(0, 204, 255, 0.5);
}
.floating-warehouse:hover {
    box-shadow: 0 6px 30px rgba(0, 204, 255, 0.8);
}

/* Tooltip عند المرور */
.floating-btn::before {
    content: attr(data-title);
    position: absolute;
    left: 70px;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    font-size: 14px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    font-family: 'Cairo';
}

.floating-btn:hover::before {
    opacity: 1;
    left: 75px;
}
</style>

<!-- 1- لوحة التحكم -->
<a href="admin2.html" class="floating-btn floating-admin" data-title="لوحة التحكم">
    ⚙️
</a>

<!-- 2- لوحة المشغل -->
<a href="operator.html" class="floating-btn floating-operator" data-title="لوحة المشغل">
    🎮
</a>

<!-- 3- لوحة المستودع -->
<a href="admin.html" class="floating-btn floating-warehouse" data-title="لوحة المستودع">
    📦
</a>
</body>
</html>
