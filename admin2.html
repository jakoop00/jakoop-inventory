<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Jakoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }

        /* شاشة كلمة السر */
      .login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

      .login-box {
            background: #141414;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
        }

      .login-box h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 32px;
        }

      .login-box input {
            width: 300px;
            padding: 15px;
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
            font-family: 'Cairo';
            margin-bottom: 20px;
        }

      .login-box input:focus {
            outline: none;
            border-color: #00ff88;
        }

      .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00ff88, #00cc88);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo';
        }

      .login-error {
            color: #ff3333;
            margin-top: 15px;
            display: none;
        }

      .container { max-width: 1400px; margin: 0 auto; display: none; }
      .container.active { display: block; }

     .header {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

     .header h1 {
            font-size: 32px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

     .header-actions { display: flex; gap: 15px; }

     .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

     .stat-card {
            background: #141414;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #222;
            text-align: center;
        }

     .stat-card h3 { color: #888; font-size: 14px; margin-bottom: 10px; }
     .stat-card.num { font-size: 36px; font-weight: 900; color: #00ff88; }

     .controls {
            background: #141414;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid #222;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

     .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo';
        }

     .btn-primary { background: linear-gradient(45deg, #00ff88, #00cc88); color: #000; }
     .btn-danger { background: linear-gradient(45deg, #ff3333, #cc0000); color: white; }
     .btn-warning { background: linear-gradient(45deg, #ffa500, #ff8800); color: #000; }
     .btn-info { background: linear-gradient(45deg, #00ccff, #0088ff); color: white; }

     .btn:hover { transform: scale(1.05); }

     .products-grid { display: grid; gap: 20px; }

     .product-card {
            background: #141414;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #222;
            display: grid;
            grid-template-columns: 150px 1fr auto;
            gap: 20px;
            align-items: start;
        }

     .product-card.sold { opacity: 0.6; border-color: #ff3333; }

     .product-image-box {
            position: relative;
      }

     .product-image-box img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
      }

     .image-upload {
            margin-top: 10px;
      }

     .image-upload label {
            display: block;
            padding: 8px;
            background: #00ff88;
            color: #000;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
      }

     .image-upload input { display: none; }

     .product-info h3 { color: #00ff88; margin-bottom: 12px; font-size: 20px; }
     .product-info p { color: #888; font-size: 14px; margin: 6px 0; }
      
     .price-edit {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
      }

     .price-edit input {
            width: 120px;
            padding: 10px;
            background: #0a0a0a;
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #ffa500;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
      }

     .price-edit button {
            padding: 10px 15px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
      }

     .product-actions { display: flex; gap: 10px; flex-direction: column; }

     .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
      }

     .modal.active { display: flex; }

     .modal-content {
            background: #141414;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
      }

     .modal-content h2 { color: #00ff88; margin-bottom: 20px; }

     .form-group { margin-bottom: 20px; }
     .form-group label { display: block; margin-bottom: 8px; color: #888; }
     .form-group input,.form-group textarea {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-family: 'Cairo';
            font-size: 15px;
      }

     .form-group textarea { min-height: 100px; }

     .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
            border: 2px solid #333;
      }

     .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
      }

     .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
      }

     .badge-success { background: #00ff88; color: #000; }
     .badge-danger { background: #ff3333; color: white; }

        /* زرين عائمين زي الجلري بس تروس */
     .floating-settings {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff0088, #ff0066);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9997;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 0, 136, 0.5);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            font-size: 28px;
      }

     .floating-settings:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 30px rgba(255, 0, 136, 0.7);
      }

     .floating-tools {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0088ff, #0066ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9997;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 136, 255, 0.5);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            font-size: 28px;
      }

     .floating-tools:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 30px rgba(0, 136, 255, 0.7);
      }

     .back-link {
            color: #00ff88;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
      }
    </style>
</head>
<body>

    <!-- شاشة كلمة السر -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔒 لوحة التحكم</h2>
            <p style="color: #888; margin-bottom: 20px;">ادخل كلمة السر للدخول</p>
            <input type="password" id="passwordInput" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">دخول</button>
            <div class="login-error" id="loginError">❌ كلمة السر غلط</div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="container" id="mainContent">
        <div class="header">
            <div>
                <h1>⚙️ لوحة التحكم</h1>
                <a href="gallery.html" class="back-link">← العودة للمعرض</a>
            </div>
            <div class="header-actions">
                <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
                <button class="btn btn-primary" onclick="openAddModal()">+ إضافة جهاز</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>إجمالي الأجهزة</h3>
                <div class="num" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>متوفر</h3>
                <div class="num" id="availableCount">0</div>
            </div>
            <div class="stat-card">
                <h3>مباع</h3>
                <div class="num" id="soldCount">0</div>
            </div>
            <div class="stat-card">
                <h3>قيمة المخزون</h3>
                <div class="num" id="totalValue">0</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-danger" onclick="exportData()">💾 تصدير البيانات</button>
            <button class="btn btn-warning" onclick="document.getElementById('importFile').click()">📂 استيراد</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn btn-info" onclick="generateCode()">🔧 توليد كود</button>
            <button class="btn btn-primary" onclick="changePassword()">🔑 تغيير كلمة السر</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- زرين عائمين تروس -->
    <a href="#" class="floating-settings" title="الإعدادات" onclick="alert('الإعدادات قريباً'); return false;">⚙️</a>
    <a href="#" class="floating-tools" title="الأدوات" onclick="alert('الأدوات قريباً'); return false;">🔧</a>

    <!-- Modal إضافة/تعديل -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">إضافة جهاز جديد</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>اسم الجهاز *</label>
                    <input type="text" id="productName" required placeholder="ASUS VivoBook 15">
                </div>

                <div class="form-group">
                    <label>صورة الجهاز *</label>
                    <input type="file" id="productImageFile" accept="image/*" onchange="previewImage(event)">
                    <img id="imagePreview" class="image-preview" style="display:none">
                    <input type="hidden" id="productImage">
                </div>

                <div class="form-group">
                    <label>المعالج</label>
                    <input type="text" id="productCPU" placeholder="Intel Core i7-1065G7">
                </div>

                <div class="form-group">
                    <label>الرام</label>
                    <input type="text" id="productRAM" placeholder="8GB DDR4">
                </div>

                <div class="form-group">
                    <label>التخزين</label>
                    <input type="text" id="productStorage" placeholder="512GB SSD">
                </div>

                <div class="form-group">
                    <label>كرت الشاشة</label>
                    <input type="text" id="productGPU" placeholder="NVIDIA MX330 2GB">
                </div>

                <div class="form-group">
                    <label>الشاشة</label>
                    <input type="text" id="productScreen" placeholder="15.6 FHD IPS">
                </div>

                <div class="form-group">
                    <label>السعر (دينار) *</label>
                    <input type="number" id="productPrice" required placeholder="220">
                </div>

                <div class="form-group">
                    <label>الحالة</label>
                    <select id="productStatus" style="width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: white; font-family: 'Cairo';">
                        <option value="available">متوفر</option>
                        <option value="sold">مباع</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 حفظ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">❌ إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // كلمة السر - غيرها هون
        const ADMIN_PASSWORD = 'jakoop2026'; // ← غير كلمة السر هون
        
        let products = JSON.parse(localStorage.getItem('jakoop_products') || '[]');

        // تسجيل الدخول
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem('jakoop_admin_logged', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                renderProducts();
                updateStats();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            if (confirm('متأكد بدك تطلع؟')) {
                localStorage.removeItem('jakoop_admin_logged');
                location.reload();
            }
        }

        function changePassword() {
            const newPass = prompt('اكتب كلمة السر الجديدة:');
            if (newPass && newPass.length >= 4) {
                alert('⚠️ غير كلمة السر من الكود:\nconst ADMIN_PASSWORD = \'' + newPass + '\';');
            }
        }

        // تحقق من تسجيل الدخول
        if (localStorage.getItem('jakoop_admin_logged') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            renderProducts();
            updateStats();
        }

        // رفع الصورة
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('productImage').value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProducts() {
            localStorage.setItem('jakoop_products', JSON.stringify(products));
            renderProducts();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = products.length;
            document.getElementById('availableCount').textContent = products.filter(p => p.status === 'available').length;
            document.getElementById('soldCount').textContent = products.filter(p => p.status === 'sold').length;
            document.getElementById('totalValue').textContent = products.reduce((sum, p) => sum + (p.status === 'available'? parseFloat(p.price) : 0), 0) + ' د';
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding: 60px; color: #666;">لا توجد أجهزة. اضغط "إضافة جهاز" للبدء</div>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card ${p.status === 'sold'? 'sold' : ''}">
                    <div class="product-image-box">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="image-upload">
                            <label for="img-${p.id}">📸 تغيير الصورة</label>
                            <input type="file" id="img-${p.id}" accept="image/*" onchange="updateProductImage('${p.id}', event)">
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>المعالج: ${p.cpu || '-'}</p>
                        <p>الرام: ${p.ram || '-'} | التخزين: ${p.storage || '-'}</p>
                        <div class="price-edit">
                            <input type="number" value="${p.price}" id="price-${p.id}">
                            <button onclick="updatePrice('${p.id}')">💾 حفظ السعر</button>
                        </div>
                        <span class="badge ${p.status === 'available'? 'badge-success' : 'badge-danger'}">
                            ${p.status === 'available'? 'متوفر ✓' : 'مباع ✗'}
                        </span>
                    </div>
                    <div class="product-actions">
                        <button class="btn btn-primary" onclick="editProduct('${p.id}')">✏️ تعديل</button>
                        <button class="btn btn-warning" onclick="toggleStatus('${p.id}')">
                            ${p.status === 'available'? '❌ بيع' : '✓ إرجاع'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function updateProductImage(id, event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const p = products.find(x => x.id === id);
                    p.image = e.target.result;
                    saveProducts();
                    alert('✅ تم تحديث الصورة!');
                };
                reader.readAsDataURL(file);
            }
        }

        function updatePrice(id) {
            const newPrice = document.getElementById('price-' + id).value;
            const p = products.find(x => x.id === id);
            p.price = newPrice;
            saveProducts();
            alert('✅ تم تحديث السعر!');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة جهاز جديد';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = 'تعديل الجهاز';
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name;
            document.getElementById('productImage').value = p.image;
            document.getElementById('imagePreview').src = p.image;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('productCPU').value = p.cpu || '';
            document.getElementById('productRAM').value = p.ram || '';
            document.getElementById('productStorage').value = p.storage || '';
            document.getElementById('productGPU').value = p.gpu || '';
            document.getElementById('productScreen').value = p.screen || '';
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productStatus').value = p.status;
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        document.getElementById('productForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value || Date.now().toString();
            const product = {
                id,
                name: document.getElementById('productName').value,
                image: document.getElementById('productImage').value,
                cpu: document.getElementById('productCPU').value,
                ram: document.getElementById('productRAM').value,
                storage: document.getElementById('productStorage').value,
                gpu: document.getElementById('productGPU').value,
                screen: document.getElementById('productScreen').value,
                price: document.getElementById('productPrice').value,
                status: document.getElementById('productStatus').value
            };

            const index = products.findIndex(p => p.id === id);
            if (index >= 0) {
                products[index] = product;
            } else {
                products.push(product);
            }

            saveProducts();
            closeModal();
            alert('✅ تم الحفظ بنجاح!');
        };

        function toggleStatus(id) {
            const p = products.find(x => x.id === id);
            p.status = p.status === 'available'? 'sold' : 'available';
            saveProducts();
        }

        function deleteProduct(id) {
            if (confirm('متأكد بدك تحذف هاد الجهاز؟')) {
                products = products.filter(p => p.id!== id);
                saveProducts();
            }
        }

        function exportData() {
            const data = JSON.stringify(products, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'jakoop_products_' + Date.now() + '.json';
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    products = JSON.parse(event.target.result);
                    saveProducts();
                    alert('✅ تم الاستيراد بنجاح!');
                } catch {
                    alert('❌ ملف غير صالح');
                }
            };
            reader.readAsText(file);
        }

        function generateCode() {
            console.clear();
            console.log('=== انسخ الكود التالي وحطه بملف gallery.html ===');
            console.log(JSON.stringify(products, null, 2));
            alert('✅ افتح Console المتصفح (F12) وانسخ الكود');
        }
    </script>

</body>
</html>
