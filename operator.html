<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع JAKOOP - المشغل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); min-height: 100vh; padding: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        .login-box h1 { color: #2c3e50; margin-bottom: 10px; }
        .login-box .badge { background: #27ae60; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.85em; display: inline-block; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1.1em; text-align: center; }
        .login-box button { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; font-weight: 600; }
        .error { color: #e74c3c; margin-top: 10px; display: none; }
        .container { max-width: 1200px; margin: 0 auto; display: none; }
        .header { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; position: relative; }
        .header h1 { color: #2c3e50; font-size: 2.2em; }
        .logout { position: absolute; top: 20px; left: 20px; background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #2c3e50; font-size: 0.9em; margin-bottom: 10px; }
        .stat-card .value { font-size: 2em; font-weight: bold; color: #333; }
        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #2c3e50; color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>🏪 مستودع JAKOOP</h1>
        <span class="badge">وضع القراءة فقط</span>
        <p style="color: #666; margin-bottom: 10px;">صفحة المشغل</p>
        <input type="password" id="passwordInput" placeholder="ادخل كلمة السر" maxlength="6">
        <button onclick="checkPassword()">دخول</button>
        <p class="error" id="errorMsg">كلمة السر غلط</p>
        <p style="color: #999; font-size: 0.85em; margin-top: 20px;">الباسوورد بتتغير كل 3 ساعات</p>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="header">
            <button class="logout" onclick="logout()">تسجيل خروج</button>
            <h1>📊 مستودع JAKOOP</h1>
            <p>عرض المخزون - قراءة فقط</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>إجمالي القطع</h3>
                <div class="value" id="totalItems">0</div>
            </div>
            <div class="stat-card">
                <h3>القيمة الكاملة</h3>
                <div class="value" id="totalValue">0 د.أ</div>
            </div>
            <div class="stat-card">
                <h3>عدد الأصناف</h3>
                <div class="value" id="itemCount">0</div>
            </div>
        </div>

        <div class="table-container">
            <h2 style="color: #2c3e50; margin-bottom: 20px;">📦 المخزون الحالي</h2>
            <table>
                <thead>
                    <tr>
                        <th>اسم القطعة</th>
                        <th>الفئة</th>
                        <th>الكمية</th>
                        <th>السعر</th>
                        <th>القيمة الكاملة</th>
                        <th>تاريخ الإضافة</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <tr><td colspan="6" style="text-align: center; color: #999;">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCdCJL3-N0GAK8Gde75GA0RE5mJL3fS_9g",
            authDomain: "jakoop-inveventory.firebaseapp.com",
            projectId: "jakoop-inveventory",
            storageBucket: "jakoop-inveventory.firebasestorage.app",
            messagingSenderId: "31950221366",
            appId: "1:31950221366:web:553df9a6aec8c3774c2897"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const inventoryRef = collection(db, 'inventory');

        // باسوورد المشغل: يوم + ساعة + 33
        function getOperatorPassword() {
            const now = new Date();
            const day = now.getDate();
            const hour = Math.floor(now.getHours() / 3) * 3;
            return `${day}${hour.toString().padStart(2, '0')}33`;
        }

        window.checkPassword = function() {
            const input = document.getElementById('passwordInput').value;
            const correct = getOperatorPassword();
            
            if (input === correct) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                loadData();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        window.logout = function() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function loadData() {
            onSnapshot(inventoryRef, (snapshot) => {
                let totalItems = 0, totalValue = 0;
                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">لا توجد قطع بالمخزون</td></tr>';
                } else {
                    snapshot.forEach((docSnap) => {
                        const item = docSnap.data();
                        totalItems += item.quantity;
                        totalValue += item.quantity * item.price;
                        tbody.innerHTML += `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.category}</td>
                                <td>${item.quantity}</td>
                                <td>${item.price.toFixed(2)} د.أ</td>
                                <td>${(item.quantity * item.price).toFixed(2)} د.أ</td>
                                <td>${item.date}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('totalItems').textContent = totalItems;
                document.getElementById('totalValue').textContent = totalValue.toFixed(2) + ' د.أ';
                document.getElementById('itemCount').textContent = snapshot.size;
            });
        }
    </script>
</body>
</html>
