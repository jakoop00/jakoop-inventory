<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض القطع والأجهزة - جاكوب للكمبيوتر</title>
    <meta name="description" content="شاهد جميع اللابتوبات والكمبيوترات المتوفرة في محل جاكوب للكمبيوتر في عمان مع الأسعار والمواصفات">
    
    <!-- نفس كود Analytics من الصفحة الرئيسية حطه هون -->
    
   <style>
body {
    font-family: 'Cairo', sans-serif;
    background: #1a1a1a;
    color: white;
    margin: 0;
}

.header {
    text-align: center;
    padding: 20px;
    background: #0f0f0f;
}

.back-btn {
    color: #00ff88;
    text-decoration: none;
    font-size: 18px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 30px;
    padding: 40px 20px;
    max-width: 1400px;
    margin: 0 auto;
}

.item {
    background: #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #333;
}

.item img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 15px;
    cursor: pointer;
}

.item h3 {
    color: #00ff88;
    margin: 10px 0;
    font-size: 24px;
}

.price {
    color: #ffa500;
    font-size: 28px;
    font-weight: bold;
    margin: 15px 0;
}

.whatsapp-btn {
    display: block;
    background: #25D366;
    color: white;
    text-align: center;
    padding: 15px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>
<body>
    <div class="header">

            <div class="price">75 دينار</div>
