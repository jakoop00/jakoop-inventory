<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض القطع والأجهزة - Jakoop For Computer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .item-sold {
    opacity: 0.7;
    position: relative;
}

.item-sold::after {
    content: 'مباع';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);
    background: rgba(255, 0, 0, 0.9);
    color: white;
    padding: 15px 40px;
    font-size: 32px;
    font-weight: 900;
    border: 4px solid white;
    border-radius: 10px;
    z-index: 6;
    pointer-events: none;
}
        :root {
            --primary: #00ff88;
            --secondary: #00ccff;
            --dark: #0a0a0a;
            --card: #141414;
            --gold: #ffa500;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 204, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* الهيدر */
       .header {
            position: relative;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, transparent, var(--primary), transparent) 1;
            z-index: 1;
        }

        /* زر العودة نابض */
       .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 12px 25px;
            border: 2px solid var(--primary);
            border-radius: 50px;
            transition: 0.3s;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
        }

       .back-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateX(5px);
        }

       .header h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

       .header p { color: #888; font-size: 18px; }

       .badge {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--primary);
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-size: 14px;
            color: var(--primary);
        }

        /* الجالري */
       .gallery {
            position: relative;
            max-width: 1500px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 35px;
            z-index: 1;
        }

       .item {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

       .item:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.3);
        }

       .stock-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(45deg, #00ff88, #00cc88);
            color: #000;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            z-index: 5;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        /* صورة واحدة فقط */
       .item-image {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            background: #000;
        }

       .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
            transition: 0.4s;
        }

       .item:hover .item-image img {
            transform: scale(1.1);
        }

        /* زر اطلب الصور نابض لكل جهاز */
       .request-photos-btn {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: linear-gradient(135deg, #ff0088, #ff0066);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            z-index: 5;
            animation: pulse-photo 2s infinite;
            box-shadow: 0 4px 15px rgba(255, 0, 136, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes pulse-photo {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 0, 136, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 6px 25px rgba(255, 0, 136, 0.7); }
        }

        /* المحتوى */
       .item-content { padding: 25px; }
       .item h3 {
            color: var(--primary);
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

       .item h3::before { content: '💻'; font-size: 24px; }

       .specs {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-right: 3px solid var(--secondary);
        }

       .specs-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

       .specs-row:last-child { border: none; }
       .specs-label { color: #888; font-size: 14px; }
       .specs-value { color: var(--secondary); font-weight: 700; font-size: 14px; }

       .price-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }

       .price {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .price span { font-size: 18px; color: #888; }

       .whatsapp-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

       .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
        }

        /* أزرار عائمة Admin + Operator */
       .floating-admin {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff0088, #ff0066);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9997;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 0, 136, 0.5);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            font-size: 24px;
        }

       .floating-admin:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 0, 136, 0.7);
        }

       .floating-operator {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0088ff, #0066ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9997;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 136, 255, 0.5);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            font-size: 24px;
        }

       .floating-operator:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 136, 255, 0.7);
        }

        /* زر واتساب عائم نابض */
       .floating-whatsapp {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
            border: 3px solid rgba(255,255,255,0.2);
        }

       .floating-whatsapp::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #25D366;
            animation: pulse-ring 2s infinite;
        }

       .floating-whatsapp svg {
            width: 38px;
            height: 38px;
            fill: white;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Lightbox */
       .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

       .lightbox.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

       .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 0 80px rgba(0, 255, 136, 0.4);
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

       .close-lightbox {
            position: absolute;
            top: 30px;
            right: 50px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }

       .close-lightbox:hover {
            background: var(--primary);
            color: #000;
            transform: rotate(90deg);
        }

        /* الفوتر */
       .footer {
            position: relative;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            padding: 50px 20px 30px;
            text-align: center;
            border-top: 2px solid transparent;
            border-image: linear-gradient(90deg, transparent, var(--primary), transparent) 1;
            z-index: 1;
            margin-top: 60px;
        }

       .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

       .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            transition: 0.3s;
            border: 2px solid #333;
        }

       .social-btn:hover {
            transform: translateY(-5px);
        }

       .social-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-color: #25D366;
        }

       .social-facebook {
            background: linear-gradient(135deg, #1877F2, #0C63D4);
            border-color: #1877F2;
        }

       .social-email {
            background: linear-gradient(135deg, #EA4335, #C5221F);
            border-color: #EA4335;
        }

       .copyright {
            color: #666;
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

       .copyright a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
           .header h1 { font-size: 32px; }
           .gallery { grid-template-columns: 1fr; padding: 0 15px; }
           .floating-whatsapp { bottom: 20px; left: 20px; width: 60px; height: 60px; }
           .floating-admin { bottom: 20px; right: 20px; }
           .floating-operator { bottom: 90px; right: 20px; }
        }
    </style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// نفس الـ config تبع admin2
const firebaseConfig = {
    apiKey: "AIzaSyAVDbjneBoV3N9KIo86-pYccAEy6R4ULHk",
    authDomain: "jakoop-admin2.firebaseapp.com",
    projectId: "jakoop-admin2",
    storageBucket: "jakoop-admin2.firebasestorage.app",
    messagingSenderId: "581628638568",
    appId: "1:581628638568:web:2894ef9722a0a47ab3e19d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db, 'products'), (snapshot) => {
    const products = [];
    snapshot.forEach(doc => products.push({ id: doc.id,...doc.data() }));
    
    const gallery = document.querySelector('.gallery');
    
    if (products.length === 0) {
        gallery.innerHTML = '<div style="text-align:center; padding: 60px; color: #666; grid-column: 1/-1;">لا توجد أجهزة حالياً</div>';
        return;
    }
    
    gallery.innerHTML = products.map(p => `
        <div class="item ${p.status === 'sold'? 'item-sold' : ''}">
            <div class="stock-badge" style="background: ${p.status === 'available'? 'linear-gradient(45deg, #00ff88, #00cc88)' : 'linear-gradient(45deg, #ff3333, #cc0000)'};">
                ${p.status === 'available'? 'متوفر ✓' : 'مباع ✗'}
            </div>
            <div class="item-image">
                <img src="${p.image}" onclick="openLightbox(this.src)" alt="${p.name}" 
                     style="${p.status === 'sold'? 'filter: grayscale(100%) brightness(0.7);' : ''}">
                ${p.status === 'available'? `
                <a href="https://wa.me/962775131442?text=مرحبا، بدي صور ${p.name}" class="request-photos-btn">
                    📸 اطلب الصور
                </a>` : ''}
            </div>
            <div class="item-content">
                <h3>${p.name}</h3>
                <div class="specs">
                    ${p.cpu? `<div class="specs-row"><span class="specs-label">المعالج</span><span class="specs-value">${p.cpu}</span></div>` : ''}
                    ${p.ram? `<div class="specs-row"><span class="specs-label">الرام</span><span class="specs-value">${p.ram}</span></div>` : ''}
                    ${p.storage? `<div class="specs-row"><span class="specs-label">التخزين</span><span class="specs-value">${p.storage}</span></div>` : ''}
                    ${p.gpu? `<div class="specs-row"><span class="specs-label">كرت الشاشة</span><span class="specs-value">${p.gpu}</span></div>` : ''}
                    ${p.screen? `<div class="specs-row"><span class="specs-label">الشاشة</span><span class="specs-value">${p.screen}</span></div>` : ''}
                </div>
                <div class="price-section">
                    <div class="price" style="${p.status === 'sold'? 'text-decoration: line-through; opacity: 0.5;' : ''}">${p.price} <span>دينار</span></div>
                </div>
                <a href="${p.status === 'available'? `https://wa.me/962775131442?text=مرحبا، بدي ${p.name} بسعر ${p.price} دينار` : '#'}" 
                   class="whatsapp-btn" 
                   style="${p.status === 'sold'? 'background: #555; cursor: not-allowed; pointer-events: none;' : ''}">
                    ${p.status === 'available'? '💬 اطلب الآن عبر واتساب' : '❌ تم البيع - غير متوفر'}
                </a>
            </div>
        </div>
    `).join('');
});
</script>
