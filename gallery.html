<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض القطع والأجهزة - جاكوب للكمبيوتر</title>
    <meta name="description" content="شاهد جميع اللابتوبات والكمبيوترات المتوفرة في محل جاكوب للكمبيوتر في عمان مع الأسعار والمواصفات">
    
    <!-- نفس كود Analytics من الصفحة الرئيسية حطه هون -->
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #0f172a; 
            color: white; 
            margin: 0; 
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #22c55e; margin: 10px 0; }
        .back-btn {
            background: #3b82f6; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            display: inline-block;
            margin-bottom: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
        }
        .item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .item h3 { color: #22c55e; margin: 5px 0; }
        .price { 
            color: #fbbf24; 
            font-size: 20px; 
            font-weight: bold; 
            margin: 10px 0;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
        <h1>معرض الأجهزة والقطع المتوفرة</h1>
        <p>جميع الأجهزة مفحوصة وبضمان حقيقي</p>
    </div>

    <div class="gallery">
        <!-- لابتوب 1 - انسخ هاد البلوك لكل جهاز جديد -->
        <div class="item">
            <img src="https://jakoop.tech/asus.jpg?text=Laptop+1" alt="ASUS">
            <img src="https://jakoop.tech/asus1.jpg?text=Laptop+1" alt="ASUS">
            <img src="https://jakoop.tech/asus2.jpg?text=Laptop+1" alt="ASUS">
            <img src="https://jakoop.tech/asus3.jpg?text=Laptop+1" alt="ASUS">
            <h3>ASUS</h3>
            <p>معالج i7 جيل عاشر  | رام 8GB | هارد 512 SSD | </p>
            <div class="price">220 دينار</div>
            <a href="https://wa.me/962775131442?text=مرحبا، مهتم بجهاز ASUS i7" class="whatsapp-btn">
                استفسر واتساب 🟢
            </a>
        </div>

        <!-- لابتوب 2 -->
        <div class="item">
            <img src="https://via.placeholder.com/400x200.png?text=Laptop+2" alt="HP EliteBook">
            <h3>Dell OPTIPLEX 3010 </h3>
            <p>معالج i3 جيل الثالث | رام 8GB | هارد 500 HDD كيس فقط |</p>
            <div class="price">75 دينار</div>
            <a href="https://wa.me/962775131442?text=مرحبا، مهتم بجهاز Dell OPTIPLEX 3010" class="whatsapp-btn">
                استفسر واتساب 🟢
            </a>
        </div>

        <!-- ضيف أجهزة جديدة هون بنفس الطريقة -->
        
    </div>
</body>
</html>
