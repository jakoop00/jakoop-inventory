<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع JAKOOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; }
        .header h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #667eea; font-size: 0.9em; margin-bottom: 10px; }
        .stat-card .value { font-size: 2em; font-weight: bold; color: #333; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .form-container h2 { color: #667eea; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; font-weight: 600; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow-x: auto; }
        .table-container h2 { color: #667eea; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #f5f5f5; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
        .status { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; z-index: 1000; display: none; }
        .status.success { background: #2ecc71; display: block; }
        .status.error { background: #e74c3c; display: block; }
        .connection-status { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-right: 10px; }
        .connection-status.online { background: #2ecc71; color: white; }
        .connection-status.offline { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="status" id="status"></div>
    <div class="container">
        <div class="header">
            <h1>🏪 مستودع JAKOOP <span class="connection-status offline" id="connStatus">غير متصل</span></h1>
            <p>نظام إدارة المخزون السحابي</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>إجمالي القطع</h3>
                <div class="value" id="totalItems">0</div>
            </div>
            <div class="stat-card">
                <h3>القيمة الكاملة</h3>
                <div class="value" id="totalValue">0 د.أ</div>
            </div>
            <div class="stat-card">
                <h3>عدد الأصناف</h3>
                <div class="value" id="itemCount">0</div>
            </div>
        </div>

        <div class="form-container">
            <h2>➕ إضافة قطعة جديدة</h2>
            <form id="itemForm">
                <div class="form-group">
                    <label>اسم القطعة</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="itemQuantity" min="1" required>
                </div>
                <div class="form-group">
                    <label>السعر للقطعة (د.أ)</label>
                    <input type="number" id="itemPrice" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>الفئة</label>
                    <select id="itemCategory">
                        <option value="ملابس">ملابس</option>
                        <option value="أحذية">أحذية</option>
                        <option value="اكسسوارات">اكسسوارات</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>
                <button type="submit" class="btn">إضافة قطعة</button>
            </form>
        </div>

        <div class="table-container">
            <h2>📦 المخزون الحالي</h2>
            <table>
                <thead>
                    <tr>
                        <th>اسم القطعة</th>
                        <th>الفئة</th>
                        <th>الكمية</th>
                        <th>السعر</th>
                        <th>القيمة الكاملة</th>
                        <th>تاريخ الإضافة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <tr><td colspan="7" style="text-align: center; color: #999;">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCdCJL3-N0GAK8Gde75GA0RE5mJL3fS_9g",
            authDomain: "jakoop-inventory.firebaseapp.com",
            projectId: "jakoop-inventory",
            storageBucket: "jakoop-inventory.firebasestorage.app",
            messagingSenderId: "31950221366",
            appId: "1:31950221366:web:553df9a6aec8c3774c2897"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const inventoryRef = collection(db, 'inventory');

        function showStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + (isError ? 'error' : 'success');
            setTimeout(() => status.className = 'status', 3000);
        }

        function updateConnectionStatus(online) {
            const conn = document.getElementById('connStatus');
            conn.textContent = online ? 'متصل ✓' : 'غير متصل';
            conn.className = 'connection-status ' + (online ? 'online' : 'offline');
        }

        onSnapshot(inventoryRef, (snapshot) => {
            updateConnectionStatus(true);
            let totalItems = 0, totalValue = 0;
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">لا توجد قطع بالمخزون</td></tr>';
            } else {
                snapshot.forEach((docSnap) => {
                    const item = docSnap.data();
                    totalItems += item.quantity;
                    totalValue += item.quantity * item.price;
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td>${item.category}</td>
                            <td>${item.quantity}</td>
                            <td>${item.price.toFixed(2)} د.أ</td>
                            <td>${(item.quantity * item.price).toFixed(2)} د.أ</td>
                            <td>${item.date}</td>
                            <td><button class="btn-delete" onclick="deleteItem('${docSnap.id}')">حذف</button></td>
                        </tr>
                    `;
                });
            }
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalValue').textContent = totalValue.toFixed(2) + ' د.أ';
            document.getElementById('itemCount').textContent = snapshot.size;
        }, (error) => {
            updateConnectionStatus(false);
            showStatus('خطأ بالاتصال: ' + error.message, true);
        });

        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(inventoryRef, {
                    name: document.getElementById('itemName').value,
                    quantity: parseInt(document.getElementById('itemQuantity').value),
                    price: parseFloat(document.getElementById('itemPrice').value),
                    category: document.getElementById('itemCategory').value,
                    date: new Date().toLocaleDateString('ar-EG')
                });
                showStatus('✅ تمت الإضافة بنجاح');
                e.target.reset();
            } catch (error) {
                showStatus('❌ خطأ: ' + error.message, true);
            }
        });

        window.deleteItem = async (id) => {
            if (confirm('متأكد من الحذف؟')) {
                try {
                    await deleteDoc(doc(db, 'inventory', id));
                    showStatus('✅ تم الحذف');
                } catch (error) {
                    showStatus('❌ خطأ: ' + error.message, true);
                }
            }
        };
    </script>
</body>
</html>
