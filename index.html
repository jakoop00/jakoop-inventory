        .form-group { margin-bottom: 15px; }

        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }

        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }

        .table-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow-x: auto; }

        .search-bar { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin: 20px 0; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { background: #667eea; color: white; padding: 12px 6px; text-align: right; }
        td { padding: 12px 6px; border-bottom: 1px solid #e0e0e0; }

        .btn-delete:hover { background: #c0392b; }
        .status { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; z-index: 1000; display: none; }
        .status.success { background: #2ecc71; display: block; }
        .status.error { background: #e74c3c; display: block; }
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; max-width: 700px; margin: 30px auto; padding: 30px; border-radius: 15px; }
        .modal-content h2 { color: #667eea; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; }
        .btn-cancel { background: #e74c3c; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
